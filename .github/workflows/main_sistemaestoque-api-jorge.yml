name: Build, test and deploy ASP.NET Core app to Azure Web App - sistemaestoque-api-jorge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SistemaEstoque.Api.slnx

      - name: Build solution
        run: dotnet build SistemaEstoque.Api.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test SistemaEstoque.Api.slnx --configuration Release --no-build --verbosity normal

      - name: Publish API
        run: dotnet publish SistemaEstoque.Api/SistemaEstoque.Api.csproj --configuration Release --output "${{ env.DOTNET_ROOT }}/myapp"

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: windows-latest
    needs: build-and-test

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_78B8112C60BE4C008CFD0D29E4791E86 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9B358A801D4A4013AC93ADB7ECAB379B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1720081150064DF88AD84A7A53047BF3 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sistemaestoque-api-jorge'
          slot-name: 'Production'
          package: .